baseURL: https://blog.felpo.dev/
languageCode: pt-br
title: Felpo Blog

theme: ["PaperMod"]

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - identifier: pesquisa
      name: Pesquisa
      url: /search/
      weight: 10

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
            - - '\['
              - '\]'
            - - $$
              - $$
          inline:
            - - '\('
              - '\)'
        enable: true
params:
  math: true
